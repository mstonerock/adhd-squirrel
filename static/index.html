<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADHD-Squirrel</title>
    <!-- Tailwind CSS via CDN (matching Google Stitch exports) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Add any custom Vanilla CSS here or just rely on Tailwind */
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-8">
    
    <div class="max-w-2xl w-full bg-slate-800 rounded-xl shadow-2xl p-8 border border-slate-700">
        <h1 class="text-3xl font-extrabold mb-6 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
            ADHD-Squirrel Setup Complete!
        </h1>
        
        <p class="text-slate-300 mb-4">
            You can replace everything inside the <code class="bg-black px-2 py-1 rounded">body</code> tag with the UI code you generated from Google Stitch!
        </p>

        <div class="bg-black/30 rounded-lg p-6 my-6 border border-slate-700">
            <h2 class="text-xl font-bold mb-4 text-emerald-400">Test Google AI Studio Connection</h2>
            
            <div class="flex gap-2">
                <input type="text" id="promptInput" placeholder="Ask Gemini something..." 
                       class="flex-1 bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 focus:outline-none focus:border-emerald-500 transition-colors">
                <button id="sendBtn" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded-lg font-semibold transition-colors">
                    Send
                </button>
            </div>
            
            <div id="loading" class="hidden mt-4 text-emerald-400/70 animate-pulse text-sm">
                Thinking...
            </div>
            
            <div id="resultBox" class="mt-4 p-4 bg-slate-900/50 rounded-lg whitespace-pre-wrap font-mono text-sm hidden">
                <!-- Results go here -->
            </div>
        </div>
    </div>

    <script>
        // Example JS function to call the FastAPI backend to interact with Gemini securely
        const sendBtn = document.getElementById('sendBtn');
        const promptInput = document.getElementById('promptInput');
        const resultBox = document.getElementById('resultBox');
        const loading = document.getElementById('loading');

        sendBtn.addEventListener('click', async () => {
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            // Show loading
            loading.classList.remove('hidden');
            resultBox.classList.add('hidden');
            sendBtn.disabled = true;

            try {
                // Call our local Python Backend route
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                resultBox.textContent = data.result;
                resultBox.classList.remove('hidden');
            } catch (error) {
                console.error(error);
                resultBox.textContent = "Error: Did not receive response from server.";
                resultBox.classList.remove('hidden');
                resultBox.classList.add('text-red-400');
            } finally {
                loading.classList.add('hidden');
                sendBtn.disabled = false;
            }
        });

        // Allow pressing Enter key to submit
        promptInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });
    </script>
</body>
</html>
